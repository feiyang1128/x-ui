{{define "inboundModal"}}
<a-modal id="inbound-modal" v-model="inModal.visible" :title="inModal.title" @ok="inModal.ok"
         :confirm-loading="inModal.confirmLoading" :closable="true" :mask-closable="false"
         :ok-text="inModal.okText" cancel-text='{{ i18n "close" }}'>
    {{template "form/inbound"}}
</a-modal>
<script>
    const initialCoreTypes = [
        {{- range $index, $coreType := .availableCoreTypes }}
        {{- if $index }},{{ end }}
        { value: '{{ $coreType }}', label: '{{ $coreType }}' }
        {{- end }}
    ];
    const fallbackCoreTypes = initialCoreTypes.length > 0 ? initialCoreTypes : [{ value: 'xray', label: 'xray' }];

    const inModal = {
        title: '',
        visible: false,
        confirmLoading: false,
        okText: '确定',
        confirm: null,
        inbound: new Inbound(),
        dbInbound: new DBInbound(),
        ok() {
            ObjectUtil.execute(inModal.confirm, inModal.inbound, inModal.dbInbound);
        },
        show({ title='', okText='确定', inbound=null, dbInbound=null, confirm=(inbound, dbInbound)=>{} }) {
            this.title = title;
            this.okText = okText;
            if (inbound) {
                this.inbound = Inbound.fromJson(inbound.toJson());
            } else {
                this.inbound = new Inbound();
            }
            if (dbInbound) {
                this.dbInbound = new DBInbound(dbInbound);
            } else {
                this.dbInbound = new DBInbound();
            }
            this.confirm = confirm;
            this.visible = true;
        },
        close() {
            inModal.visible = false;
            inModal.loading(false);
        },
        loading(loading) {
            inModal.confirmLoading = loading;
        },
    };

    const protocols = {
        VMESS: Protocols.VMESS,
        VLESS: Protocols.VLESS,
        HYSTERIA2: Protocols.HYSTERIA2,
        TROJAN: Protocols.TROJAN,
        SHADOWSOCKS: Protocols.SHADOWSOCKS,
        DOKODEMO: Protocols.DOKODEMO,
        SOCKS: Protocols.SOCKS,
        HTTP: Protocols.HTTP,
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#inbound-modal',
        data: {
            inModal: inModal,
            Protocols: protocols,
            protocolOptions: [],
            SSMethods: SSMethods,
            coreTypeOptions: fallbackCoreTypes.slice(),
            visibleCoreTypeOptions: fallbackCoreTypes.slice(),
            get inbound() {
                return inModal.inbound;
            },
            get dbInbound() {
                return inModal.dbInbound;
            }
        },
        watch: {
            'inModal.inbound.protocol': {
                handler(value) {
                    if (value === Protocols.HYSTERIA2 && this.hasSingboxCore()) {
                        this.inModal.inbound.coreType = 'sing-box';
                        if (ObjectUtil.isEmpty(this.inModal.inbound.stream.tls.server)) {
                            this.inModal.inbound.stream.tls.server = HY2_SELF_SIGNED_SNI;
                        }
                    }
                    this.syncVisibleCoreTypeOptions();
                },
                immediate: true,
            },
            'inModal.inbound.coreType'() {
                this.syncVisibleCoreTypeOptions();
            },
        },
        methods: {
            hasSingboxCore() {
                return this.coreTypeOptions.some(item => item.value === 'sing-box');
            },
            syncProtocolOptions() {
                this.protocolOptions = [
                    protocols.VMESS,
                    protocols.VLESS,
                    ...(this.hasSingboxCore() ? [protocols.HYSTERIA2] : []),
                    protocols.TROJAN,
                    protocols.SHADOWSOCKS,
                    protocols.DOKODEMO,
                    protocols.SOCKS,
                    protocols.HTTP,
                ];
                if (!this.protocolOptions.includes(this.inbound.protocol)) {
                    this.inbound.protocol = this.protocolOptions[0];
                }
            },
            async loadCoreOptions() {
                const msg = await HttpUtil.post('/server/installedCores');
                if (!msg.success || !Array.isArray(msg.obj) || msg.obj.length === 0) {
                    this.syncProtocolOptions();
                    this.syncVisibleCoreTypeOptions();
                    return;
                }
                this.coreTypeOptions = msg.obj.map(item => ({ value: item, label: item }));
                this.syncProtocolOptions();
                this.syncVisibleCoreTypeOptions();
            },
            streamNetworkChange(oldValue) {
                if (oldValue === 'kcp') {
                    this.inModal.inbound.tls = false;
                }
            },
            syncVisibleCoreTypeOptions() {
                if (this.inbound.protocol === Protocols.HYSTERIA2) {
                    this.visibleCoreTypeOptions = this.coreTypeOptions.filter(item => item.value === 'sing-box');
                } else {
                    this.visibleCoreTypeOptions = this.coreTypeOptions.slice();
                }
                const options = this.visibleCoreTypeOptions;
                if (options.length === 0) {
                    return;
                }
                if (!options.some(item => item.value === this.inbound.coreType)) {
                    this.inbound.coreType = options[0].value;
                }
            },
        },
        async mounted() {
            this.syncProtocolOptions();
            this.syncVisibleCoreTypeOptions();
            await this.loadCoreOptions();
        },
    });

</script>
{{end}}
